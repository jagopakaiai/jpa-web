backend:
  name: github
  repo: jagopakaiai/jpa-web
  branch: main
  base_url: https://jpa.my.id
  auth_endpoint: api/auth/github

# All editor uploads land in /public/uploads/, which Eleventy
# passthrough-copies to /uploads/ at the site root.
media_folder: "public/uploads"
public_folder: "/uploads"

# JSON output formatted with 2-space indent for clean git diffs.
json_extension: json

# Show a richer dashboard with collection cards instead of a flat list.
display_url: https://jpa.my.id
site_url: https://jpa.my.id

# ──────────────────────────────────────────────────────────────────
# Collections
# ──────────────────────────────────────────────────────────────────
collections:

  # ═══════════════════════════════════════════════════════════════
  # 1. HOME — Pengaturan Landing Page
  # ═══════════════════════════════════════════════════════════════
  - name: home_settings
    label: "Home"
    label_singular: "Setting"
    description: "Pengaturan landing page — hero, site global"
    files:

      - name: global
        label: "Site Global"
        file: content/site.json
        fields:
          - { name: siteName,      label: "Nama Site",         widget: string }
          - { name: institution,   label: "Institution Label", widget: string }
          - { name: contactEmail,  label: "Email Kontak",      widget: string }
          - { name: footerCopy,    label: "Footer Copyright",  widget: string }
          - name: footerClusters
            label: "Footer Clusters"
            widget: list
            field: { name: cluster, label: "Cluster", widget: string }

      - name: hero
        label: "Homepage Hero"
        file: content/hero.json
        fields:
          - { name: label,       label: "Eyebrow Label",   widget: string }
          - { name: title,       label: "Title",           widget: string }
          - { name: subtitle,    label: "Subtitle",        widget: string }
          - { name: description, label: "Description",     widget: text }
          - { name: ctaText,     label: "CTA Text",        widget: string }
          - { name: ctaHref,     label: "CTA Link",        widget: string, hint: "URL or anchor link" }
          - name: stats
            label: "Stats Grid"
            widget: list
            fields:
              - { name: value, label: "Stat Value (e.g. 50+)", widget: string }
              - { name: label, label: "Stat Label (e.g. SKILL.MD)", widget: string }

      - name: ecosystem
        label: "Ecosystem (Editor & Tools)"
        file: content/ecosystem.json
        fields:
          - name: sponsors
            label: "Editor Utama"
            widget: list
            fields:
              - { name: name,       label: "Name",       widget: string }
              - { name: href,       label: "Website",    widget: string }
              - { name: ariaLabel,  label: "Aria Label", widget: string }
              - { name: logoClass,  label: "Logo CSS Class", widget: string, required: false }
              - { name: logoImage,  label: "Logo Image (optional)", widget: image, required: false }

          - name: partners
            label: "Ecosystem Partners"
            widget: list
            fields:
              - { name: name,       label: "Name",       widget: string }
              - { name: href,       label: "Website",    widget: string }
              - { name: ariaLabel,  label: "Aria Label", widget: string }
              - { name: logoClass,  label: "Logo CSS Class", widget: string, required: false }
              - { name: logoImage,  label: "Logo Image (optional)", widget: image, required: false }

  # ═══════════════════════════════════════════════════════════════
  # 2. JPA CLI — Pengaturan Posting Aplikasi JPA CLI
  # ═══════════════════════════════════════════════════════════════
  - name: jpacli_settings
    label: "JPA CLI"
    label_singular: "Setting"
    description: "Pengaturan posting aplikasi JPA CLI"
    files:

      - name: jpacli
        label: "JPA CLI Content"
        file: content/jpacli.json
        fields:

          - name: tile
            label: "Homepage Tile"
            widget: object
            fields:
              - { name: label,     label: "Tile Label",  widget: string }
              - { name: ariaLabel, label: "Aria Label",  widget: string }
              - { name: href,      label: "Tile Link",   widget: string }
              - { name: date,      label: "Version Badge", widget: string, hint: "e.g. v1.0" }
              - { name: details,   label: "Install Commands", widget: list, field: { name: line, label: "Command", widget: string } }
              - { name: sponsors,  label: "Editors Line", widget: string, hint: "e.g. CURSOR · CLAUDE CODE · VS CODE" }
              - { name: ctaText,   label: "CTA Text",    widget: string }

          - name: page
            label: "JPA CLI Detail Page"
            widget: object
            fields:
              - { name: label,      label: "Page Label",  widget: string }
              - { name: backHref,   label: "Back Link",   widget: string }
              - { name: backLabel,  label: "Back Label",  widget: string }
              - { name: date,       label: "Hero Title",  widget: string }
              - { name: year,       label: "Hero Subtitle", widget: string }

              - name: info
                label: "Info Rows"
                widget: list
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: value, label: "Value", widget: string }

              - name: cta
                label: "Install CTA"
                widget: object
                fields:
                  - { name: text,    label: "Text",    widget: string }
                  - { name: href,    label: "URL",     widget: string }
                  - { name: variant, label: "Variant", widget: select, options: [accent, interactive] }

              - name: program
                label: "Fitur JPA CLI"
                widget: list
                fields:
                  - { name: time,        label: "Nomor",       widget: string }
                  - { name: title,       label: "Judul Fitur", widget: string }
                  - { name: description, label: "Deskripsi",   widget: text }
                  - { name: speaker,     label: "Tags",        widget: string }

              - name: featured
                label: "Editor & AI Agent Supported"
                widget: list
                fields:
                  - { name: name, label: "Name", widget: string }
                  - { name: org,  label: "Description",  widget: string }

              - name: sponsors
                label: "Komponen Ekosistem"
                widget: list
                fields:
                  - { name: name, label: "Name", widget: string }
                  - { name: role, label: "Role", widget: string }

              - name: organizations
                label: "Kompatibilitas"
                widget: list
                field: { name: name, label: "Name", widget: string }

      - name: jpacli_features
        label: "JPA CLI Features Spotlight"
        file: content/spotlights/jpacli-features.json
        fields:
          - { name: label,         label: "Aria Label",          widget: string }
          - { name: controlsLabel, label: "Controls Aria Label", widget: string }
          - { name: prevLabel,     label: "Prev Button Label",   widget: string }
          - { name: nextLabel,     label: "Next Button Label",   widget: string }
          - { name: dotsLabel,     label: "Dots Aria Label",     widget: string }
          - name: slides
            label: "Slides"
            widget: list
            types:
              - name: project-list
                label: "Feature List"
                fields:
                  - { name: type,              label: "Type",         widget: hidden, default: "project-list" }
                  - { name: label,             label: "Label",        widget: string }
                  - { name: dotLabel,          label: "Dot Label",    widget: string }
                  - { name: tagline,           label: "Tagline",      widget: string, required: false }
                  - { name: projectsAriaLabel, label: "List Aria",    widget: string }
                  - name: heroStat
                    label: "Hero Stat (optional)"
                    widget: object
                    required: false
                    fields:
                      - { name: value, label: "Value", widget: string }
                      - { name: unit,  label: "Unit",  widget: string }
                  - name: projects
                    label: "Items"
                    widget: list
                    fields:
                      - { name: name,              label: "Name",         widget: string }
                      - { name: tags,              label: "Tags",         widget: string }
                      - { name: progress,          label: "Progress %",   widget: number, min: 0, max: 100 }
                      - { name: progressLabel,     label: "Progress Label", widget: string }
                      - { name: progressVariant,   label: "Variant",      widget: select, options: [default, active, warning, success] }
                      - { name: progressAria,      label: "Progress Aria", widget: string }

  # ═══════════════════════════════════════════════════════════════
  # 3. BLOG — Pengaturan Blog / Artikel
  # ═══════════════════════════════════════════════════════════════
  - name: blog
    label: "Blog"
    label_singular: "Artikel"
    description: "Pengaturan blog / artikel"
    folder: "src/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { name: title,    label: "Judul",          widget: string }
      - { name: date,     label: "Tanggal",        widget: datetime }
      - { name: author,   label: "Penulis",        widget: string }
      - { name: tags,     label: "Tags",           widget: list, field: { name: tag, label: "Tag", widget: string } }
      - { name: excerpt,  label: "Ringkasan",      widget: text }
      - { name: featured, label: "Featured",       widget: boolean, default: false }
      - { name: body,     label: "Konten Artikel", widget: markdown }

  # ═══════════════════════════════════════════════════════════════
  # 4. SKILL — Pengaturan Listing Skill.MD
  # ═══════════════════════════════════════════════════════════════
  - name: skills_settings
    label: "Skill"
    label_singular: "Setting"
    description: "Pengaturan listing skill.md"
    files:

      - name: skillsData
        label: "Skills Directory Data"
        file: content/skillsData.json
        fields:
          - { name: label,         label: "Sidebar Label",      widget: string }
          - { name: total,         label: "Total Count",        widget: number }
          - { name: totalUnit,     label: "Total Unit Caption", widget: string }
          - { name: backHref,      label: "Back Link",          widget: string }
          - { name: backLabel,     label: "Back Aria Label",    widget: string }
          - { name: navAriaLabel,  label: "Nav Aria Label",     widget: string }

          - name: sidebarOrder
            label: "Sidebar Order (Category IDs)"
            widget: list
            field: { name: id, label: "Category ID", widget: string }

          - name: colleges
            label: "Kategori Skill"
            widget: list
            fields:
              - { name: id,                 label: "ID (slug)",        widget: string }
              - { name: title,              label: "Section Title",    widget: string }
              - { name: sidebarLabel,       label: "Sidebar Label",    widget: string }
              - { name: sidebarAriaLabel,   label: "Sidebar Aria",     widget: string }
              - { name: sidebarEmphasis,    label: "Sidebar Emphasis", widget: select, options: [null, interactive, accent], required: false }
              - { name: count,              label: "Count",            widget: number }
              - name: members
                label: "Skill Files"
                widget: list
                fields:
                  - { name: name,     label: "Filename",     widget: string }
                  - { name: dept,     label: "Framework",    widget: string }
                  - { name: interest, label: "Description",  widget: string, required: false }

  # ═══════════════════════════════════════════════════════════════
  # 5. DESIGN — Pengaturan Listing Design.MD
  # ═══════════════════════════════════════════════════════════════
  - name: designs
    label: "Design"
    label_singular: "Design Template"
    description: "Pengaturan listing design.md"
    folder: "src/designs"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { name: title,       label: "Judul",           widget: string }
      - { name: slug,        label: "Slug",            widget: string }
      - { name: category,    label: "Kategori",        widget: string }
      - { name: framework,   label: "Framework",       widget: string }
      - { name: description, label: "Deskripsi",       widget: text }
      - { name: author,      label: "Author",          widget: string }
      - { name: version,     label: "Version",         widget: string }
      - { name: downloads,   label: "Downloads",       widget: number, default: 0 }
      - { name: featured,    label: "Featured",        widget: boolean, default: false }
      - { name: body,        label: "Detail",          widget: markdown }

  # ═══════════════════════════════════════════════════════════════
  # 6. MCP — Pengaturan Listing MCP
  # ═══════════════════════════════════════════════════════════════
  - name: mcps
    label: "MCP"
    label_singular: "MCP Server"
    description: "Pengaturan listing MCP"
    folder: "src/mcps"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { name: title,       label: "Nama MCP",        widget: string }
      - { name: slug,        label: "Slug",            widget: string }
      - { name: category,    label: "Kategori",        widget: string }
      - { name: protocol,    label: "Protocol",        widget: string, default: "MCP" }
      - { name: description, label: "Deskripsi",       widget: text }
      - { name: author,      label: "Author",          widget: string }
      - { name: version,     label: "Version",         widget: string }
      - { name: installs,    label: "Installs",        widget: number, default: 0 }
      - { name: featured,    label: "Featured",        widget: boolean, default: false }
      - { name: body,        label: "Detail",          widget: markdown }

  # ═══════════════════════════════════════════════════════════════
  # Spotlight Carousels (Showcase & Touchpoint)
  # ═══════════════════════════════════════════════════════════════
  - name: spotlights
    label: "Spotlight Carousels"
    files:

      - name: showcase
        label: "Showcase Spotlight"
        file: content/spotlights/showcase.json
        fields:
          - { name: label,         label: "Aria Label",          widget: string }
          - { name: controlsLabel, label: "Controls Aria Label", widget: string }
          - { name: prevLabel,     label: "Prev Button Label",   widget: string }
          - { name: nextLabel,     label: "Next Button Label",   widget: string }
          - { name: dotsLabel,     label: "Dots Aria Label",     widget: string }
          - name: slides
            label: "Slides"
            widget: list
            types:

              - name: sponsor-grid
                label: "Editor Grid"
                fields:
                  - { name: type,     label: "Type",      widget: hidden, default: "sponsor-grid" }
                  - { name: label,    label: "Label",     widget: string }
                  - { name: dotLabel, label: "Dot Label", widget: string }
                  - { name: items,    label: "Items Source", widget: select, options: [sponsors, partners], default: "sponsors" }

              - name: partner-grid
                label: "Ecosystem Grid"
                fields:
                  - { name: type,     label: "Type",      widget: hidden, default: "partner-grid" }
                  - { name: label,    label: "Label",     widget: string }
                  - { name: dotLabel, label: "Dot Label", widget: string }
                  - { name: items,    label: "Items Source", widget: select, options: [sponsors, partners], default: "partners" }

              - name: stats-grid
                label: "Stats Grid"
                fields:
                  - { name: type,     label: "Type",      widget: hidden, default: "stats-grid" }
                  - { name: label,    label: "Label",     widget: string }
                  - { name: dotLabel, label: "Dot Label", widget: string }
                  - name: stats
                    label: "Stats"
                    widget: list
                    fields:
                      - { name: value, label: "Value", widget: string }
                      - { name: label, label: "Label", widget: string }

              - name: faculty-bar
                label: "Distribution Bar"
                fields:
                  - { name: type,         label: "Type",      widget: hidden, default: "faculty-bar" }
                  - { name: label,        label: "Label",     widget: string }
                  - { name: dotLabel,     label: "Dot Label", widget: string }
                  - { name: total,        label: "Total",     widget: number }
                  - { name: barAriaLabel, label: "Bar Aria",  widget: string }
                  - name: segments
                    label: "Segments"
                    widget: list
                    fields:
                      - { name: variant,   label: "Color Variant", widget: select, options: [null, alt1, alt2, alt3, alt4, alt5], required: false }
                      - { name: count,     label: "Count",         widget: number }
                      - { name: title,     label: "Title (tooltip)", widget: string }
                      - { name: ariaLabel, label: "Aria Label",    widget: string }
                  - name: legend
                    label: "Legend"
                    widget: list
                    field: { name: label, label: "Label", widget: string }
                  - name: cta
                    label: "CTA Pill"
                    widget: object
                    fields:
                      - { name: text, label: "Text", widget: string }
                      - { name: href, label: "Link", widget: string }

              - name: feature
                label: "Feature Slide"
                fields:
                  - { name: type,         label: "Type",      widget: hidden, default: "feature" }
                  - { name: label,        label: "Label",     widget: string }
                  - { name: dotLabel,     label: "Dot Label", widget: string }
                  - { name: extraClasses, label: "Extra CSS Classes", widget: string, required: false }
                  - { name: name,         label: "Feature Name", widget: string }
                  - { name: subtitle,     label: "Subtitle",  widget: string }
                  - { name: ctaText,      label: "CTA Text",  widget: string }
                  - { name: ctaHref,      label: "CTA Link",  widget: string }
                  - { name: ctaVariant,   label: "CTA Variant", widget: select, options: [interactive, accent] }

      - name: touchpoint
        label: "Touchpoint Spotlight"
        file: content/spotlights/touchpoint.json
        fields:
          - { name: label,         label: "Aria Label",          widget: string }
          - { name: controlsLabel, label: "Controls Aria Label", widget: string }
          - { name: prevLabel,     label: "Prev Button Label",   widget: string }
          - { name: nextLabel,     label: "Next Button Label",   widget: string }
          - { name: dotsLabel,     label: "Dots Aria Label",     widget: string }
          - name: slides
            label: "Slides"
            widget: list
            types:
              - name: touchpoint
                label: "Touchpoint"
                fields:
                  - { name: type,         label: "Type",      widget: hidden, default: "touchpoint" }
                  - { name: label,        label: "Label",     widget: string }
                  - { name: dotLabel,     label: "Dot Label", widget: string }
                  - { name: extraClasses, label: "Extra CSS Classes", widget: string, default: "slide--touch" }
                  - name: primary
                    label: "Primary Content"
                    widget: object
                    fields:
                      - { name: kind,       label: "Kind",  widget: select, options: [link, handle, venue] }
                      - { name: text,       label: "Text",  widget: string }
                      - { name: href,       label: "Href (link kind only)", widget: string, required: false }
                      - { name: extraClass, label: "Extra CSS Class", widget: string, required: false }
                  - { name: decoration,    label: "Decoration", widget: select, options: [null, qr, linkedin], required: false }
                  - name: address
                    label: "Address (venue kind only)"
                    widget: object
                    required: false
                    fields:
                      - name: lines
                        label: "Address Lines"
                        widget: list
                        field: { name: line, label: "Line", widget: string }
                  - name: cta
                    label: "Call to Action"
                    widget: object
                    required: false
                    fields:
                      - { name: kind,    label: "Kind", widget: select, options: [btn-primary, arrow-pill] }
                      - { name: text,    label: "Text", widget: string }
                      - { name: href,    label: "Link", widget: string }
                      - { name: variant, label: "Variant (arrow-pill only)", widget: string, required: false }
