<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JPA Admin CMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    /* Customize Sveltia CMS Login and Header Logo */
    img.logo, 
    .logo {
      content: url('/logo-admin.png') !important;
      object-fit: contain !important;
    }
    
    /* Keep the login page logo square, centered, and 2x larger */
    .container img.logo {
      width: 192px !important;
      max-width: none !important;
      height: 192px !important;
      max-height: none !important;
      border-radius: 16px;
    }

    /* Change Sveltia CMS title to < JPA CMS > */
    .container h1 {
      font-size: 0 !important;
    }

    .container h1::after {
      content: "< JPA CMS >" !important;
      font-size: 23px !important;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
  </style>
  <!--
    Sveltia CMS is a modern, Decap-CMS-compatible Git-based content
    management system. It runs entirely in the browser and commits content
    edits directly to GitHub via the GitHub API. Auth happens via
    Netlify Identity + Git Gateway.

    Pin the Sveltia version explicitly (not @latest) so a CMS upgrade
    is a deliberate change. Bump the version after testing the new
    release in a preview deployment.
  -->
</head>
<body>
  <script type="module" src="https://unpkg.com/@sveltia/cms@^0.55.0/dist/sveltia-cms.js"></script>
</body>
</html>
