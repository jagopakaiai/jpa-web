[build]
  command = "npm run build"
  publish = "_site"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Cache-Control = "no-store"

[[redirects]]
  from = "/api/auth/github"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/auth/github/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200
